spring:
  datasource:
    url: jdbc:mysql://${db-host}:3306/${db-name}
    username: ${db-username}
    password: ${db-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
server:
  port: 9093
  servlet:
    context-path: /mis-productos/

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${db-host}:3306/${db-name}
    username: ${db-username}
    password: ${db-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

---
endpoint: http://productos:${PRODUCTOS_PORT}/mis-productos
endpoint-codigo-barras: http://codigo-barras:${CODIGO_BARRAS_PORT}/mis-productos/codigo-barras
api:
  add: ${ENDPOINT_PRODUCTOS}
  dell: ${ENDPOINT_PRODUCTOS}
  iseet: ${ENDPOINT_PRODUCTOS}
  codigo_barras: ${ENDPOINT_PRODUCTOS}
  venta-service: ${ENDPOINT_PRODUCTOS}
  venta-detalle-ventas: ${ENDPOINT_PRODUCTOS}
  productos: ${ENDPOINT_PRODUCTOS}
  usuarios: ${ENDPOINT_USUARIOS}

pagos-url:
  pagos: http://localhost:9094/mis-productos

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true


clave-seguridad:
  clave: ${toke-jwt}

