---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://prod-server:3306/db_prod
    username: ${DB_PROD_USER}
    password: ${DB_PROD_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

---
port-micros:
  usuarios: 9090
  productos: 9091
  codigo-barras: 9092

---

path-context-micros: mis-productos
uri: http://localhost

endpoint: http://localhost:${port-micros.productos}/mis-productos
endpoint-codigo-barras: http://localhost:${port-micros.codigo-barras}/mis-productos/codigo-barras
pagos-url:
    pagos: http://localhost:9094/mis-productos
api:
  add: ${endpoint}/codigo-barras
  dell: ${endpoint}/detalle-ventas
  iseet: ${endpoint}/productos
  codigo_barras: ${endpoint-codigo-barras}
  usuarios: http://localhost:9090/mis-productos/usuarios
  venta-service: ${endpoint}/ventas
  venta-detalle-ventas: ${endpoint}/detalle-ventas
  productos: ${endpoint}/productos

management:
  endpoints:
    web:
      base-path: /monitoring
      exposure:
        include: "*"



clave-seguridad:
  clave: miClaveSuperSeguraDe32Caracteres

logging:
  level:
    root: INFO
    com.venta_bolsas.ventas: DEBUG




